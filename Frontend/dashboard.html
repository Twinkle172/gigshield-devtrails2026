<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
    </head>
<body>
<h2>Dashboard</h2>
<button onclick="checkTrigger()">Check Trigger</button>
<script>
    function checkTrigger(){
        fetch('http://127.0.0.1:5000/trigger-check')
        .then(res=>res.json())
        .then(data=>{
            if(data.trigger){
                alert("Payout: " + data.reason)
            }else{
                alert("No trigger")
            }
        })
    }
</script>     
    
</body>    
</html>
