<!DOCTYPE html>
<html>
    <head>
        <title>Wallet</title>
    </head>
<body>
<h2>Wallet</h2>
<div id="balance"></div>
<script>
fetch('http://127.0.0.1:5000/wallet')
.then(res=>res.json())
.then(data=>{
    document.getElementById('balance').innerText="Balance: ₹" +data.balance;
})    
</script>    
</body>    
</html>
