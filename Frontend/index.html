<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-enabled parametric insurance platform for gig workers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #45a049;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #d9534f; /* red for errors */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Enter your email">
        <button onclick="Login()">Login</button>
        <div id="message"></div>
    </div>

    <script>
        function Login() {
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');

            // Basic validation
            if (!email) {
                messageDiv.innerText = "Please enter your email.";
                return;
            }

            fetch('http://127.0.0.1:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error("Server error: " + res.status);
                }
                return res.json();
            })
            .then(data => {
                messageDiv.style.color = "#4CAF50"; // green for success
                messageDiv.innerText = data.message;
            })
            .catch(err => {
                messageDiv.style.color = "#d9534f"; // red for errors
                messageDiv.innerText = "Login failed: " + err.message;
            });
        }
    </script>
</body>
</html>
